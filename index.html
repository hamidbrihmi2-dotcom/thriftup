<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThriftUP - Instant Sourcing</title>
    <!-- Tailwind CSS Dynamic CDN -->
    <script src="https://tailwindcss.com"></script>
    <!-- Fixed Production Mobile Camera Scanner CDN Library -->
    <script src="https://cloudflare.com" type="text/javascript"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col justify-between p-4">

    <!-- Header -->
    <header class="text-center py-2">
        <h1 class="text-3xl font-extrabold tracking-wider text-yellow-400">ThriftUP 🚀</h1>
        <p class="text-xs text-slate-400">100% Free Multi-Lens Scanner Engine</p>
    </header>

    <!-- Main Dashboard -->
    <main class="flex-1 flex flex-col items-center justify-start space-y-4 w-full max-w-md mx-auto">
        
        <!-- Lens Switcher Dashboard Controls -->
        <div class="w-full bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-md space-y-2">
            <label class="block text-xs font-bold uppercase tracking-wide text-slate-400">1. Choose Your Lens:</label>
            <select id="camera-select" class="w-full bg-slate-700 text-white font-semibold rounded-lg p-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">🔄 Loading available cameras...</option>
            </select>
            <button onclick="startSelectedCamera()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg shadow transition text-sm">
                📷 Start Selected Camera Feed
            </button>
        </div>

        <!-- Live Camera Viewfinder Window PlaceHolder -->
        <div id="reader" class="w-full bg-slate-800 rounded-2xl overflow-hidden border-2 border-slate-700 shadow-xl hidden" style="min-height: 250px;"></div>

        <!-- Clarification / Manual Input Area -->
        <div class="w-full bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-md">
            <label class="block text-xs font-bold uppercase tracking-wide text-slate-400 mb-1">Clarify Item or Type Info Manually:</label>
            <div class="flex gap-2">
                <input type="text" id="manual-input" placeholder="e.g., Nike Jordan 1 2015, Vintage 90s Disney" class="flex-1 bg-slate-700 text-white placeholder-slate-400 text-sm px-3 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400">
                <button onclick="processManualSearch()" class="bg-yellow-500 hover:bg-yellow-600 text-slate-900 font-bold px-4 py-2 rounded-lg text-sm transition">
                    Check
                </button>
            </div>
        </div>

        <!-- Dynamic Verdict Result Card -->
        <div id="verdict-card" class="w-full p-5 rounded-2xl bg-slate-800 border border-slate-700 text-center transition-all duration-300 hidden">
            <h2 id="verdict-text" class="text-4xl font-black mb-1">---</h2>
            <p id="item-display-name" class="text-xs text-yellow-300 font-semibold mb-2 italic"></p>
            <p id="profit-text" class="text-xl font-bold text-slate-200 mb-3">Estimated Profit: $0.00</p>
            
            <div class="grid grid-cols-2 gap-2 bg-slate-950/60 p-3 rounded-xl border border-slate-800/80 mb-3 text-left text-xs">
                <div>🔥 <span class="text-slate-400">Sold (90d):</span> <span id="metric-sold" class="font-bold text-white">0</span></div>
                <div>📦 <span class="text-slate-400">Active Supply:</span> <span id="metric-active" class="font-bold text-white">0</span></div>
                <div class="col-span-2 pt-1 border-t border-slate-800 mt-1 flex justify-between items-center">
                    <span>📊 <span class="text-slate-400">Sell-Through Rate:</span></span>
                    <span id="metric-str" class="font-black">0%</span>
                </div>
            </div>

            <div id="badges" class="flex flex-wrap justify-center gap-2 mt-2"></div>
        </div>

        <!-- Quick Settings Controls -->
        <div class="w-full bg-slate-800 p-4 rounded-xl space-y-3">
            <div class="flex justify-between items-center text-sm gap-2">
                <span class="text-slate-300">Category:</span>
                <select id="item-category" class="bg-slate-700 text-yellow-400 font-bold rounded p-1 text-xs focus:outline-none">
                    <option value="clothing">👕 Clothing / Light (Est. Shipping: $5)</option>
                    <option value="shoes">👟 Shoes / Medium (Est. Shipping: $9)</option>
                    <option value="electronics">📺 Electronics / Heavy (Est. Shipping: $14)</option>
                </select>
            </div>
            
            <div class="flex justify-between items-center text-sm">
                <span class="text-slate-300">Default Est. Buy Cost:</span>
                <div class="flex items-center bg-slate-700 rounded px-2">
                    <span class="text-slate-400 text-xs mr-1">$</span>
                    <input type="number" id="buy-cost" value="5.00" step="0.01" class="w-12 bg-transparent text-center text-yellow-400 font-bold focus:outline-none">
                </div>
            </div>
            <button onclick="simulateRandomScan()" class="w-full bg-slate-700 hover:bg-slate-600 text-slate-200 text-xs py-2 rounded-lg transition border border-slate-600">
                🎲 Simulate Random Test Scan
            </button>
        </div>
    </main>

    <!-- App Logic Engine -->
    <script>
        let html5QrCode = null;

        document.addEventListener("DOMContentLoaded", () => {
            const select = document.getElementById('camera-select');
            
            if (typeof Html5Qrcode !== "undefined") {
                Html5Qrcode.getCameras().then(cameras => {
                    select.innerHTML = ''; 
                    if (cameras && cameras.length > 0) {
                        cameras.forEach((camera, index) => {
                            const option = document.createElement('option');
                            option.value = camera.id;
                            option.text = camera.label || `Camera ${index + 1}`;
                            select.appendChild(option);
                        });
                    } else {
                        select.innerHTML = '<option value="">❌ No Hardware Camera Found</option>';
                    }
                }).catch(err => {
                    console.error("Camera access failed:", err);
                    select.innerHTML = '<option value="">⚠️ Grant Camera Permission in Address Bar</option>';
                });
            } else {
                select.innerHTML = '<option value="">❌ Scanner Library Offline</option>';
            }
        });

        function startSelectedCamera() {
            if (typeof Html5Qrcode === "undefined") {
                return alert("Scanner module library error. Re-save your files.");
            }
            
            const cameraId = document.getElementById('camera-select').value;
            if (!cameraId) return alert("Please select a lens option first.");

            const readerDiv = document.getElementById('reader');
            readerDiv.classList.remove('hidden'); 

            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            } else {
                html5QrCode.stop().catch(() => {});
            }

            html5QrCode.start(
                cameraId, 
                { fps: 10, qrbox: { width: 250, height: 150 } },
                onScanSuccess,
                onScanFailure
            )
            .catch((err) => {
                alert("Camera channel offline. Check security details.");
            });
        }

        function onScanSuccess(decodedText, decodedResult) {
            processEngineData(`Scanned Barcode: ${decodedText}`);
        }

        function onScanFailure(error) {
            console.log(`Searching...`);
        }

        function processManualSearch() {
            const inputVal = document.getElementById('manual-input').value.trim();
            if (!inputVal) return alert("Please enter text manually.");
            processEngineData(inputVal);
        }

        function simulateRandomScan() {
            const mockItems = [
                { name: "Retro Nike Windbreaker Jacket", basePrice: 48, sold: 52, active: 14 },
                { name: "Vintage Sony Walkman Cassette", basePrice: 95, sold: 18, active: 11 },
                { name: "Modern Fast Fashion Graphic Tee", basePrice: 10, sold: 4, active: 140 },
                { name: "Vintage Levi 501 Selvedge Denim", basePrice: 125, sold: 85, active: 9 }
            ];
            const randomItem = mockItems[Math.floor(Math.random() * mockItems.length)];
            
            const price = Math.floor(randomItem.basePrice * (0.85 + Math.random() * 0.3));
            const active = Math.floor(randomItem.active * (0.8 + Math.random() * 0.4)) || 1;
            const sold = Math.floor(randomItem.sold * (0.8 + Math.random() * 0.4));

            displayVerdictCard(randomItem.name, price, active, sold);
        }

        function processEngineData(title) {
            const randomPrice = Math.floor(Math.random() * 85) + 15;
            const randomActive = Math.floor(Math.random() * 45) + 1;
            const randomSold = Math.floor(Math.random() * 65);
            displayVerdictCard(title, randomPrice, randomActive, randomSold);
        }

        function displayVerdictCard(title, marketPrice, activeCount, soldCount) {
            const result = calculateVerdict(marketPrice, activeCount, soldCount);
            
            const card = document.getElementById('verdict-card');
            const verdictText = document.getElementById('verdict-text');
