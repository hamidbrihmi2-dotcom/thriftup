<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThriftUP - Instant Sourcing</title>
    <script src="https://tailwindcss.com"></script>
    <script src="https://unpkg.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col justify-between p-4">

    <!-- Header -->
    <header class="text-center py-2">
        <h1 class="text-3xl font-extrabold tracking-wider text-yellow-400">ThriftUP 🚀</h1>
        <p class="text-xs text-slate-400">100% Free Smart Sourcing Engine</p>
    </header>

    <!-- Main Dashboard -->
    <main class="flex-1 flex flex-col items-center justify-start space-y-4 w-full max-w-md mx-auto">
        
        <!-- Camera Activation Trigger Control -->
        <div class="w-full text-center">
            <button onclick="startCameraScanner()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition flex items-center justify-center gap-2">
                📷 Open Camera Scanner
            </button>
        </div>

        <!-- Live Camera Viewfinder Window PlaceHolder -->
        <div id="reader" class="w-full bg-slate-800 rounded-2xl overflow-hidden border-2 border-slate-700 shadow-xl hidden" style="min-height: 250px;"></div>

        <!-- Clarification / Manual Input Area -->
        <div class="w-full bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-md">
            <label class="block text-xs font-bold uppercase tracking-wide text-slate-400 mb-1">Clarify Item or Type Info Manually:</label>
            <div class="flex gap-2">
                <input type="text" id="manual-input" placeholder="e.g., Nike Jordan 1 2015, Vintage 90s Disney" class="flex-1 bg-slate-700 text-white placeholder-slate-400 text-sm px-3 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400">
                <button onclick="processManualSearch()" class="bg-yellow-500 hover:bg-yellow-600 text-slate-900 font-bold px-4 py-2 rounded-lg text-sm transition">
                    Check
                </button>
            </div>
        </div>

        <!-- Dynamic Verdict Result Card -->
        <div id="verdict-card" class="w-full p-5 rounded-2xl bg-slate-800 border border-slate-700 text-center transition-all duration-300 hidden">
            <h2 id="verdict-text" class="text-4xl font-black mb-1">---</h2>
            <p id="item-display-name" class="text-xs text-yellow-300 font-semibold mb-2 italic"></p>
            <p id="profit-text" class="text-xl font-bold text-slate-200 mb-3">Estimated Profit: $0.00</p>
            
            <!-- Competition Dashboard Metrics Panel -->
            <div class="grid grid-cols-2 gap-2 bg-slate-950/60 p-3 rounded-xl border border-slate-800/80 mb-3 text-left text-xs">
                <div>🔥 <span class="text-slate-400">Sold (90d):</span> <span id="metric-sold" class="font-bold text-white">0</span></div>
                <div>📦 <span class="text-slate-400">Active Supply:</span> <span id="metric-active" class="font-bold text-white">0</span></div>
                <div class="col-span-2 pt-1 border-t border-slate-800 mt-1 flex justify-between items-center">
                    <span>📊 <span class="text-slate-400">Market Speed:</span></span>
                    <span id="metric-str" class="font-black">0%</span>
                </div>
            </div>

            <!-- Badges Space -->
            <div id="badges" class="flex flex-wrap justify-center gap-2 mt-2"></div>
        </div>

        <!-- Quick Settings Controls -->
        <div class="w-full bg-slate-800 p-4 rounded-xl space-y-3">
            <div class="flex justify-between items-center text-sm gap-2">
                <span class="text-slate-300">Category:</span>
                <select id="item-category" class="bg-slate-700 text-yellow-400 font-bold rounded p-1 text-xs focus:outline-none">
                    <option value="clothing">👕 Clothing / Light (Est. Shipping: $5)</option>
                    <option value="shoes">👟 Shoes / Medium (Est. Shipping: $9)</option>
                    <option value="electronics">📺 Electronics / Heavy (Est. Shipping: $14)</option>
                </select>
            </div>
            
            <div class="flex justify-between items-center text-sm">
                <span class="text-slate-300">Default Est. Buy Cost:</span>
                <div class="flex items-center bg-slate-700 rounded px-2">
                    <span class="text-slate-400 text-xs mr-1">$</span>
                    <input type="number" id="buy-cost" value="5.00" class="w-12 bg-transparent text-center text-yellow-400 font-bold focus:outline-none">
                </div>
            </div>
            <button onclick="simulateRandomScan()" class="w-full bg-slate-700 hover:bg-slate-600 text-slate-200 text-xs py-2 rounded-lg transition border border-slate-600">
                🎲 Simulate Random Test Scan
            </button>
        </div>
    </main>

    <!-- App Logic Engine -->
    <script>
        let html5QrcodeScanner = null;

        function startCameraScanner() {
            const readerDiv = document.getElementById('reader');
            readerDiv.classList.remove('hidden'); // Show camera window layout area
            
            if (!html5QrcodeScanner) {
                html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
                    fps: 10, 
                    qrbox: 220,
                    rememberLastUsedCamera: true
                });
                html5QrcodeScanner.render(onScanSuccess, onScanFailure);
            }
        }

        function calculateVerdict(title, marketPrice, activeCount, soldCount) {
            const buyCost = parseFloat(document.getElementById('buy-cost').value) || 5.00;
            const category = document.getElementById('item-category').value;
            const ebayFee = (marketPrice * 0.135) + 0.40;
            
            let shipping = 5.00;
            if (category === 'shoes') shipping = 9.00;
            if (category === 'electronics') shipping = 14.00;
            
            const totalExpenses = buyCost + ebayFee + shipping;
            const netProfit = marketPrice - totalExpenses;

            const strRatio = activeCount > 0 ? (soldCount / activeCount) * 100 : 100;
            const isOversaturated = strRatio < 20; 

            const titleLower = title.toLowerCase();
            const isVintage = titleLower.includes('vintage') || titleLower.includes('90s') || titleLower.includes('retro') || titleLower.includes('199');
            const isCollectible = titleLower.includes('rare') || titleLower.includes('limited') || titleLower.includes('edition') || titleLower.includes('card');
            const isHighValue = marketPrice >= 100.00;

            const isBuy = (netProfit >= totalExpenses || isHighValue) && !isOversaturated;

            const card = document.getElementById('verdict-card');
            const vText = document.getElementById('verdict-text');
            const pText = document.getElementById('profit-text');
            const dName = document.getElementById('item-display-name');
            const badgesDiv = document.getElementById('badges');

            document.getElementById('metric-sold').innerText = soldCount;
            document.getElementById('metric-active').innerText = activeCount;
            
            const strDisplay = document.getElementById('metric-str');
            strDisplay.innerText = strRatio.toFixed(0) + "%";

            card.classList.remove('hidden');
            badgesDiv.innerHTML = ''; 

            if (isBuy) {
                card.className = "w-full p-5 rounded-2xl text-center transition-all bg-green-600 border-2 border-green-400 text-white shadow-lg shadow-green-900/50";
                vText.innerText = "💥 BUY 💥";
                strDisplay.className = "font-black text-green-300";
            } else if (isOversaturated && netProfit >= totalExpenses) {
                card.className = "w-full p-5 rounded-2xl text-center transition-all bg-amber-600 border-2 border-amber-400 text-white shadow-lg shadow-amber-900/50";
                vText.innerText = "🛑 PASS 🛑";
                strDisplay.className = "font-black text-red-300 animate-pulse";
                badgesDiv.innerHTML += `<span class="bg-red-500 text-white text-xs font-black px-2.5 py-1 rounded-full">⚠️ OVERSATURATED COMPETITION</span>`;
            } else {
                card.className = "w-full p-5 rounded-2xl text-center transition-all bg-red-600 border-2 border-red-400 text-white shadow-lg shadow-red-900/50";
                vText.innerText = "🛑 PASS 🛑";
                strDisplay.className = "font-black text-slate-300";
            }

            dName.innerText = `"${title}"`;
            pText.innerText = `Net Profit: $${netProfit.toFixed(2)} (Market Value: $${marketPrice.toFixed(2)})`;

            if (isVintage) badgesDiv.innerHTML += `<span class="bg-yellow-400 text-slate-900 text-xs font-black px-2.5 py-1 rounded-full">🕰️ VINTAGE</span>`;
            if (isCollectible) badgesDiv.innerHTML += `<span class="bg-purple-500 text-white text-xs font-black px-2.5 py-1 rounded-full">🏆 COLLECTIBLE</span>`;
            if (isHighValue) badgesDiv.innerHTML += `<span class="bg-cyan-400 text-slate-900 text-xs font-black px-2.5 py-1 rounded-full">💎 HIGH VALUE</span>`;
        }

        function processManualSearch() {
            const inputField = document.getElementById('manual-input');
            const text = inputField.value.trim();
            if (text === "") return alert("Please type some item info first!");

            let mockPrice = 30.00; let mockActive = 50; let mockSold = 35;
            if (text.toLowerCase().includes('vintage')) { mockPrice = 75.00; mockActive = 12; mockSold = 28; }
